<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Spark - Minimalist QR Generator</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Scripts: Tailwind & QR Library & Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @theme {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        }
        body {
            font-family: var(--font-sans);
            margin: 0;
            background-color: #f8fafc;
        }
        /* QR Code display styling */
        #qr-container img {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #qr-container canvas {
            display: none !important;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-10 selection:bg-slate-900 selection:text-white">

    <!-- Main Card -->
    <div id="main-card" class="w-full max-w-2xl bg-white rounded-[40px] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)] p-8 sm:p-12 flex flex-col gap-10 opacity-0 translate-y-4 transition-all duration-700">
        
        <!-- Header -->
        <div class="space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-slate-900">QR Spark</h1>
            <p class="text-slate-500 font-medium italic">Enter your URL below to create a high-resolution QR code instantly.</p>
        </div>

        <!-- Input Area -->
        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Destination URL</label>
                <div class="relative group">
                    <input 
                        type="text" 
                        id="url-input"
                        placeholder="https://example.com/your-page" 
                        value="https://google.com"
                        class="w-full h-16 px-6 bg-slate-50 border-2 border-slate-100 rounded-2xl text-lg text-slate-800 placeholder-slate-300 focus:outline-none focus:border-slate-900 transition-colors"
                    />
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
                        <button 
                            id="copy-btn"
                            class="p-2 hover:bg-slate-200 rounded-lg text-slate-400 transition-colors"
                            title="Copy to clipboard"
                        >
                            <i data-lucide="copy" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button 
                id="download-btn"
                class="w-full h-16 bg-slate-900 text-white rounded-2xl font-bold text-lg hover:bg-slate-800 transition-all active:scale-[0.98] shadow-lg shadow-slate-200 flex items-center justify-center gap-3"
            >
                <i data-lucide="download" class="w-5 h-5"></i>
                Download QR Code
            </button>
        </div>

        <!-- QR Display -->
        <div class="flex items-center justify-center pt-4">
            <div class="relative group">
                <div class="absolute -inset-4 bg-slate-50 rounded-[32px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div 
                    id="qr-wrapper"
                    class="relative w-48 h-48 sm:w-64 sm:h-64 bg-white p-4 sm:p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center overflow-hidden"
                >
                    <div id="placeholder" class="hidden flex flex-col items-center gap-3 text-slate-300">
                        <i data-lucide="qr-code" class="w-12 h-12"></i>
                        <span class="text-xs font-bold uppercase tracking-widest">Awaiting Input</span>
                    </div>
                    <div id="qr-container" class="w-full h-full flex items-center justify-center"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex justify-between items-center text-xs text-slate-400 font-medium border-t border-slate-50 pt-8">
            <div class="flex gap-4">
                <span class="hover:text-slate-600 cursor-pointer transition-colors">PNG</span>
                <span class="hover:text-slate-600 cursor-pointer transition-colors">SVG</span>
                <span class="hover:text-slate-600 cursor-pointer transition-colors">PDF</span>
            </div>
            <div class="flex items-center gap-1">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                <span>Instant Preview</span>
            </div>
        </div>
    </div>

    <!-- Background Stats -->
    <div class="mt-12 flex flex-wrap justify-center gap-8 sm:gap-12 text-slate-400 uppercase text-[10px] font-bold tracking-[0.2em]">
        <span>Fast Rendering</span>
        <span>Vector Support</span>
        <span>No Tracking</span>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const qrContainer = document.getElementById('qr-container');
        const placeholder = document.getElementById('placeholder');
        const mainCard = document.getElementById('main-card');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');

        let qrCode = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Reveal animation on load
        window.addEventListener('load', () => {
            mainCard.classList.remove('opacity-0', 'translate-y-4');
            generateQR();
        });

        // Function to generate QR Code
        function generateQR() {
            const value = urlInput.value.trim();
            
            qrContainer.innerHTML = '';
            
            if (value === '') {
                placeholder.classList.remove('hidden');
                qrContainer.classList.add('hidden');
                downloadBtn.disabled = true;
                downloadBtn.classList.add('bg-slate-300', 'shadow-none');
                return;
            }

            placeholder.classList.add('hidden');
            qrContainer.classList.remove('hidden');
            downloadBtn.disabled = false;
            downloadBtn.classList.remove('bg-slate-300', 'shadow-none');

            qrCode = new QRCode(qrContainer, {
                text: value,
                width: 512,
                height: 512,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Listen for input changes
        urlInput.addEventListener('input', generateQR);

        // Copy functionality
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(urlInput.value);
                const originalIcon = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5 text-green-500"></i>';
                lucide.createIcons();
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalIcon;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        });

        // Download functionality
        downloadBtn.addEventListener('click', () => {
            const img = qrContainer.querySelector('img');
            if (img && img.src) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = `qr-code-${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
    </script>
</body>
</html>
